<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLAIEN 导航站</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei",sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#111827,#1f2937,#000);
}

header h1{
font-size:48px;
margin-bottom:10px;
}

header p{
color:#bbb;
margin-bottom:30px;
}

.search{
max-width:700px;
margin:auto;
display:flex;
}

.search input{
flex:1;
padding:15px;
font-size:18px;
border:none;
border-radius:10px 0 0 10px;
outline:none;
}

.search button{
padding:15px 30px;
border:none;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
border-radius:0 10px 10px 0;
}

.category{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
padding:30px;
}

.category button{
padding:10px 20px;
border:none;
background:#1f2937;
color:white;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

.category button:hover{
background:#ff4081;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:40px;
}

.card{
background:#161b22;
border-radius:18px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px rgba(255,64,129,.4);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:15px;
font-size:22px;
}

.card p{
padding:0 15px 15px;
color:#aaa;
font-size:15px;
}

.card a{
display:block;
text-align:center;
padding:15px;
background:#ff4081;
text-decoration:none;
color:white;
font-weight:bold;
}

footer{
text-align:center;
padding:40px;
color:#777;
}
</style>

</head>
<body>

<header>

<h1>BlackSilk 导航站</h1>

<p>精选黑丝 · 白色半腿袜 · 写真导航</p>

<div class="search">

<input id="search" placeholder="搜索网站">

<button onclick="searchSite()">搜索</button>

</div>

</header>

<div class="category">

<button onclick="filter('全部')">全部</button>
<button onclick="filter('黑丝')">黑丝</button>
<button onclick="filter('白袜')">白色半腿袜</button>
<button onclick="filter('写真')">写真</button>
<button onclick="filter('Cos')">Cos</button>

</div>

<div class="grid" id="grid">

<div class="card" data-name="黑丝精选" data-type="黑丝">
<img src="https://picsum.photos/500/300?1">
<h3>黑丝精选</h3>
<p>每日更新精选内容</p>
<a href="#">进入</a>
</div>

<div class="card" data-name="白色半腿袜" data-type="白袜">
<img src="https://picsum.photos/500/300?2">
<h3>白色半腿袜</h3>
<p>高清图片合集</p>
<a href="#">进入</a>
</div>

<div class="card" data-name="写真图库" data-type="写真">
<img src="https://picsum.photos/500/300?3">
<h3>写真图库</h3>
<p>高质量写真推荐</p>
<a href="#">进入</a>
</div>

<div class="card" data-name="Cos专区" data-type="Cos">
<img src="https://picsum.photos/500/300?4">
<h3>Cos专区</h3>
<p>Cosplay 图集导航</p>
<a href="#">进入</a>
</div>

<div class="card" data-name="热门推荐" data-type="黑丝">
<img src="https://picsum.photos/500/300?5">
<h3>热门推荐</h3>
<p>最受欢迎内容</p>
<a href="#">进入</a>
</div>

<div class="card" data-name="最新更新" data-type="写真">
<img src="https://picsum.photos/500/300?6">
<h3>最新更新</h3>
<p>每天自动整理</p>
<a href="#">进入</a>
</div>

</div>

<footer>

© 2026 BlackSilk Navigation

</footer>

<script>

function filter(type){

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

if(type=="全部"){

card.style.display="block";

}else{

card.style.display=card.dataset.type==type?"block":"none";

}

});

}

function searchSite(){

let keyword=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let name=card.dataset.name.toLowerCase();

card.style.display=name.includes(keyword)?"block":"none";

});

}

</script>

</body>
</html>
